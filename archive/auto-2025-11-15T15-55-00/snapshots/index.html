<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Elifoot Snapshots Gallery</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Arial;
        margin: 24px;
        background: #111;
        color: #eee;
      }
      h1 {
        margin: 0 0 12px 0;
        font-size: 18px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 16px;
      }
      .card {
        background: #0f1113;
        border: 1px solid #222;
        padding: 10px;
        border-radius: 6px;
      }
      .thumb {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 4px;
        background: #000;
      }
      .caption {
        margin-top: 8px;
        font-size: 13px;
        color: #ccc;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .caption small {
        color: #999;
      }
      .actions a {
        color: #8fd3ff;
        text-decoration: none;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Elifoot Snapshot Gallery</h1>
    <p>
      Preview images generated by
      <code>tools/screenshot_from_snapshot.js --all-menus --replace</code>.
    </p>

    <div class="grid">
      <div class="card">
        <a href="screenshot-hub-team.png" target="_blank"
          ><img class="thumb" src="screenshot-hub-team.png" alt="hub-team"
        /></a>
        <div class="caption">
          <span>Hub — Team</span
          ><small><a href="screenshot-hub-team.png" target="_blank">open</a></small>
        </div>
      </div>

      <div class="card">
        <a href="screenshot-hub-liga.png" target="_blank"
          ><img class="thumb" src="screenshot-hub-liga.png" alt="hub-liga"
        /></a>
        <div class="caption">
          <span>Hub — Liga</span
          ><small><a href="screenshot-hub-liga.png" target="_blank">open</a></small>
        </div>
      </div>

      <div class="card">
        <a href="screenshot-hub-next-match.png" target="_blank"
          ><img class="thumb" src="screenshot-hub-next-match.png" alt="hub-next-match"
        /></a>
        <div class="caption">
          <span>Hub — Next Match</span
          ><small><a href="screenshot-hub-next-match.png" target="_blank">open</a></small>
        </div>
      </div>

      <div class="card">
        <a href="screenshot-hub-standings.png" target="_blank"
          ><img class="thumb" src="screenshot-hub-standings.png" alt="hub-standings"
        /></a>
        <div class="caption">
          <span>Hub — Standings</span
          ><small><a href="screenshot-hub-standings.png" target="_blank">open</a></small>
        </div>
      </div>

      <div class="card">
        <a href="screenshot-hub-transfers.png" target="_blank"
          ><img class="thumb" src="screenshot-hub-transfers.png" alt="hub-transfers"
        /></a>
        <div class="caption">
          <span>Hub — Transfers</span
          ><small><a href="screenshot-hub-transfers.png" target="_blank">open</a></small>
        </div>
      </div>

      <div class="card">
        <a href="screenshot-hub-finance.png" target="_blank"
          ><img class="thumb" src="screenshot-hub-finance.png" alt="hub-finance"
        /></a>
        <div class="caption">
          <span>Hub — Finance</span
          ><small><a href="screenshot-hub-finance.png" target="_blank">open</a></small>
        </div>
      </div>

      <div class="card">
        <a href="screenshot-hub-tactics.png" target="_blank"
          ><img class="thumb" src="screenshot-hub-tactics.png" alt="hub-tactics"
        /></a>
        <div class="caption">
          <span>Hub — Tactics</span
          ><small><a href="screenshot-hub-tactics.png" target="_blank">open</a></small>
        </div>
      </div>

      <div class="card">
        <a href="screenshot-intro-overlay.png" target="_blank"
          ><img class="thumb" src="screenshot-intro-overlay.png" alt="intro-overlay"
        /></a>
        <div class="caption">
          <span>Intro Overlay</span
          ><small><a href="screenshot-intro-overlay.png" target="_blank">open</a></small>
        </div>
      </div>

      <div class="card">
        <a href="screenshot-half-time-subs.png" target="_blank"
          ><img class="thumb" src="screenshot-half-time-subs.png" alt="half-time-subs"
        /></a>
        <div class="caption">
          <span>Half-time Subs</span
          ><small><a href="screenshot-half-time-subs.png" target="_blank">open</a></small>
        </div>
      </div>

      <div class="card">
        <a href="screenshot-offers-popup.png" target="_blank"
          ><img class="thumb" src="screenshot-offers-popup.png" alt="offers-popup"
        /></a>
        <div class="caption">
          <span>Offers Popup</span
          ><small><a href="screenshot-offers-popup.png" target="_blank">open</a></small>
        </div>
      </div>
    </div>
  </body>
</html>

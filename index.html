<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FootLab t1</title>
    <!-- Inline tiny favicon to avoid automatic /favicon.ico 404s when serving -->
    <link
      rel="icon"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAAWgmWQ0AAAAASUVORK5CYII="
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script>
      window.FootLab = window.FootLab || window.Elifoot || {};
    </script>
    <div id="intro-screen" style="display: flex; align-items: center; justify-content: center">
      <div
        style="
          text-align: center;
          padding: 40px;
          background: linear-gradient(135deg, #0d47a1, #42a5f5);
          color: #fff;
          border-radius: 16px;
          box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
        "
      >
        <h1 style="font-size: 4rem; margin: 0">FootLab t1</h1>
        <p style="opacity: 0.9; margin-top: 8px; font-size: 1.2rem">
          Uma experiência de gestão futebolística
        </p>
        <!-- Intro auto-advances; manual button removed to provide a smooth entry animation -->
      </div>
    </div>

    <div id="screen-setup" style="display: none">
      <div class="setup-container" style="text-align: center; padding: 40px; max-width: 420px">
        <h1 style="font-size: 2.2rem; margin-bottom: 8px">Bem-vindo ao FootLab t1</h1>
        <p style="margin: 0 0 16px 0; opacity: 0.9">
          Introduz o teu nome para receberes automaticamente uma equipa
        </p>
        <input
          type="text"
          id="coachName"
          placeholder="Nome do treinador"
          style="
            padding: 12px;
            font-size: 1.05rem;
            width: 100%;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
          "
        />
        <button id="startBtn" style="padding: 12px 18px; border-radius: 10px; font-size: 1.05rem">
          Receber Equipa e Iniciar
        </button>
        <div style="margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px;">
          <button id="loadGameSetupBtn">
            Carregar Jogo Gravado
          </button>
        </div>
      </div>
    </div>

    <div id="screen-hub" style="display: none">
      <div id="hub-content-wrapper">
        <div id="left-column">
          <div id="hub-header" class="hub-box">
            <div id="hub-header-content" style="display: flex; flex-direction: column; gap: 8px;">
              <div><span style="font-size: 0.8em; color: #888; text-transform: uppercase;">Treinador</span><br><strong id="coachNameDisplay" style="font-size: 1.1em; color: #fff;"></strong></div>
              <div><span style="font-size: 0.8em; color: #888; text-transform: uppercase;">Equipa</span><br><strong id="playerTeamNameHub" style="font-size: 1.1em; color: #fff;"></strong></div>
            </div>
            <div id="module-status-indicator"></div>
          </div>
          <div id="hub-menu" class="hub-box">
            <div class="hub-menu-main">
              <button class="hub-menu-btn" id="menu-team">EQUIPA</button>
              <button class="hub-menu-btn" id="menu-liga">LIGA</button>
              <button class="hub-menu-btn" id="menu-next-match">PRÓXIMO JOGO</button>
              <button class="hub-menu-btn" id="menu-standings">CLASSIFICAÇÕES</button>
              <button class="hub-menu-btn" id="menu-transfers">TRANSFERÊNCIAS</button>
              <button class="hub-menu-btn" id="menu-history">HISTÓRICO</button>
              <button class="hub-menu-btn" id="menu-finance">FINANÇAS</button>
            </div>
            <div class="hub-menu-footer">
              <button class="hub-menu-btn" id="save-game">GRAVAR JOGO</button>
              <button class="hub-menu-btn" id="menu-load">CARREGAR JOGO</button>
            </div>
          </div>

          <!-- Finance box moved from footer to left column -->
          <div id="club-finance-box" class="finance-item hub-box small">
            <div class="finance-title">FINANÇAS</div>
            <div>
              ORÇAMENTO: <span id="club-budget" class="finance-value">0 €</span>
            </div>
            <div>
              RECEITAS: <span id="club-revenue" class="finance-value">0 €</span>
            </div>
            <div>
              DESPESAS: <span id="club-expenses" class="finance-value">0 €</span>
            </div>
          </div>

          <!-- Tactics panel remains but will be rendered on the right column -->
          <!-- Next opponent box will be rendered on the right column -->
        </div>

        <div id="hub-main-content"></div>

        <!-- Right column: tactics and next opponent -->
        <div id="right-column">
          <div id="hub-tactic-panel" class="hub-box">
            <div class="tactic-panel-title">TÁTICAS</div>
            <div class="tactic-list" id="tacticList">
              <!-- Táticas serão inseridas aqui via JavaScript -->
            </div>
          </div>

          <!-- Next opponent box (inline, non-floating) -->
          <div id="next-opponent-box" class="hub-box">
            <div class="opponent-label">ADVERSÁRIO</div>
            <div id="nextOpponentDetails">—</div>
          </div>
        </div>
      </div>

      <button id="simulateBtnHub">SIMULAR DIA DE JOGOS</button>
    </div>

    <!-- Intro overlay shown for 3 seconds before match screen (kit + team name) -->
    <div id="intro-overlay" style="display: none" aria-hidden="true">
      <div class="intro-card">
        <div class="intro-badge" id="introBadge"></div>
        <h2 id="introTeamName">TEAM NAME</h2>
        <p id="introSubtitle">A equipa que vai entrar em campo</p>
      </div>
    </div>

    <!-- Half-time substitutions overlay (interactive) -->
    <div id="subs-overlay" style="display: none" aria-hidden="true"></div>

    <div id="screen-match">
      <div id="player-team-match">Seu Jogo: <span id="playerTeamNameMatch"></span></div>
      <div id="match-board">
        <div id="division-1" class="division-board"></div>
        <div id="division-2" class="division-board"></div>
        <div id="division-3" class="division-board"></div>
        <div id="division-4" class="division-board"></div>
      </div>
      <div id="progress-container">
        <div class="progress-bar"><div class="progress" id="dayProgress"></div></div>
      </div>
      <button id="finishSimBtn">Voltar para o Hub</button>
    </div>

    <!-- Load the generated rosters data first -->
    <script src="src/data/real_rosters_2025_26.js"></script>
    <!-- Adiciona aqui o teu ficheiro de cores se ele existir -->
    <script src="src/data/team_colors.js"></script>
    <!-- Load the main application bundle -->
    <script src="dist/app.bundle.js"></script>
    <script>
      // Diagnostic helper: poll for Tactics and MatchBoard and log when they attach
      // Disabled by default in production UI. Set `window.__showDiagnostics = true` in dev console to enable.
      (function () {
        if (!window.__showDiagnostics) return;
        try {
          var reported = { Tactics: false, MatchBoard: false };
          var tries = 0;
          var maxTries = 150; // ~30s
          var id = '__diag_box';
          var diagBox = document.getElementById(id);
          if (!diagBox) {
            diagBox = document.createElement('div');
            diagBox.id = id;
            diagBox.style.position = 'fixed';
            diagBox.style.right = '12px';
            diagBox.style.bottom = '12px';
            diagBox.style.zIndex = 9998;
            diagBox.style.background = 'rgba(0,0,0,0.6)';
            diagBox.style.color = '#fff';
            diagBox.style.padding = '8px 10px';
            diagBox.style.fontSize = '12px';
            diagBox.style.borderRadius = '6px';
            diagBox.style.maxWidth = '220px';
            diagBox.textContent = 'Diagnostics: waiting...';
            document.body.appendChild(diagBox);
          }

          var interval = setInterval(function () {
            tries++;
            if (!reported.Tactics && window.Tactics) {
              reported.Tactics = true;
              console.log('[diagnostic] window.Tactics attached', window.Tactics);
              diagBox.textContent = 'Diagnostics: Tactics OK';
            }
            if (!reported.MatchBoard && window.MatchBoard) {
              reported.MatchBoard = true;
              console.log('[diagnostic] window.MatchBoard attached', window.MatchBoard);
              diagBox.textContent = reported.Tactics
                ? 'Diagnostics: Tactics & MatchBoard OK'
                : 'Diagnostics: MatchBoard OK';
            }
            if ((reported.Tactics && reported.MatchBoard) || tries > maxTries) {
              if (!reported.Tactics) console.warn('[diagnostic] window.Tactics NOT found');
              if (!reported.MatchBoard) console.warn('[diagnostic] window.MatchBoard NOT found');
              if (!reported.Tactics || !reported.MatchBoard)
                diagBox.style.background = 'rgba(128,32,32,0.85)';
              clearInterval(interval);
            }
          }, 200);
        } catch (e) {
          console.error('Diagnostics failed', e && e.message);
        }
      })();
    </script>
  </body>
</html>
